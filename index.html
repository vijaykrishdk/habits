<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#f0ede8">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Vijay OS">
<title>Vijay OS</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
:root {
  /* Warm sand base — Apple-inspired */
  --bg:       #f0ede8;
  --bg2:      #e8e4dd;
  --glass:    rgba(255,255,255,0.55);
  --glass2:   rgba(255,255,255,0.35);
  --glass3:   rgba(255,255,255,0.2);
  --border:   rgba(255,255,255,0.7);
  --border2:  rgba(0,0,0,0.07);
  --ink:      #1c1917;
  --ink2:     #44403c;
  --muted:    #a8a29e;
  --faint:    #d6d0c9;

  /* Planet accents */
  --jupiter: #e8a020; --jupiter-s:#fff3d6;
  --mars:    #e04040; --mars-s:#ffe8e8;
  --venus:   #d060a8; --venus-s:#fce8f4;
  --mercury: #2090c8; --mercury-s:#e0f2fc;
  --saturn:  #7878a8; --saturn-s:#eeeefc;
  --sun:     #e87020; --sun-s:#fff0e0;

  /* Personal categories */
  --health:  #2a7a40;
  --wellness:#1a68a8;
  --tasks:   #8840c8;

  --green:   #2a7a40;
  --red:     #e04040;
  --orange:  #e87020;

  --radius:  18px;
  --radius-s:12px;
  --nav-h:   68px;
  --safe-b:  env(safe-area-inset-bottom, 0px);

  --shadow-glass: 0 8px 32px rgba(0,0,0,0.08), 0 2px 8px rgba(0,0,0,0.04);
  --shadow-card:  0 4px 20px rgba(0,0,0,0.06), 0 1px 4px rgba(0,0,0,0.04);
}

*, *::before, *::after {
  margin:0; padding:0; box-sizing:border-box;
  -webkit-tap-highlight-color: transparent;
}

html, body {
  height: 100%;
  overflow: hidden;
  background: var(--bg);
  font-family: 'DM Sans', sans-serif;
  font-weight: 400;
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
}

/* ── MESH BACKGROUND ── */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 70% 50% at 20% 10%, rgba(232,160,32,0.15) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 85% 20%, rgba(208,96,168,0.1) 0%, transparent 55%),
    radial-gradient(ellipse 60% 50% at 50% 90%, rgba(42,122,64,0.1) 0%, transparent 60%),
    radial-gradient(ellipse 40% 30% at 10% 70%, rgba(32,144,200,0.08) 0%, transparent 50%);
  pointer-events: none;
}

.app {
  position: relative; z-index: 1;
  display: flex; flex-direction: column;
  height: 100dvh; height: 100vh;
  max-width: 480px; margin: 0 auto;
}

/* ── TOPBAR ── */
.topbar {
  flex-shrink: 0;
  display: flex; justify-content: space-between; align-items: center;
  padding: .85rem 1.2rem .7rem;
  padding-top: calc(.85rem + env(safe-area-inset-top, 0px));
  background: var(--glass);
  backdrop-filter: blur(20px) saturate(1.8);
  -webkit-backdrop-filter: blur(20px) saturate(1.8);
  border-bottom: 1px solid var(--border);
  z-index: 20;
}

.brand {
  font-family: 'DM Serif Display', serif;
  font-size: 1.25rem;
  letter-spacing: -.02em;
  color: var(--ink);
}
.brand em { font-style: italic; color: var(--muted); }

.topbar-right { display: flex; align-items: center; gap: .5rem; }

.sync-pill {
  display: flex; align-items: center; gap: .35rem;
  padding: .3rem .7rem;
  background: var(--glass2);
  border: 1px solid var(--border);
  border-radius: 100px;
  backdrop-filter: blur(10px);
  font-size: .62rem; font-weight: 500;
  color: var(--muted); letter-spacing: .02em;
}
.sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--faint); transition: background .3s; }
.sync-dot.synced  { background: var(--green); }
.sync-dot.syncing { background: var(--orange); animation: pulse .8s infinite; }
.sync-dot.error   { background: var(--red); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

.glass-btn {
  width: 34px; height: 34px;
  background: var(--glass2);
  border: 1px solid var(--border);
  border-radius: 50%;
  backdrop-filter: blur(10px);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: .85rem; color: var(--ink2);
  transition: all .15s;
  box-shadow: var(--shadow-card);
}
.glass-btn:active { transform: scale(.92); }

/* ── DATE NAV ── */
.date-nav {
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: space-between;
  padding: .6rem 1.2rem;
  background: var(--glass2);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid rgba(255,255,255,.5);
}

.dnav-btn {
  width: 30px; height: 30px;
  background: var(--glass);
  border: 1px solid var(--border);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: .85rem; color: var(--ink2);
  backdrop-filter: blur(8px);
  transition: all .15s;
}
.dnav-btn:active { transform: scale(.9); }
.dnav-btn:disabled { opacity: .3; cursor: not-allowed; }

.date-center { text-align: center; flex: 1; padding: 0 .75rem; }
.date-main { font-family: 'DM Serif Display', serif; font-size: .95rem; color: var(--ink); letter-spacing: -.01em; }
.date-sub  { font-size: .58rem; color: var(--muted); letter-spacing: .07em; text-transform: uppercase; margin-top: .1rem; }
.date-badge {
  display: inline-block; font-size: .55rem; font-weight: 600; letter-spacing: .05em;
  padding: .15rem .55rem; border-radius: 100px; margin-top: .25rem;
}
.badge-today   { background: var(--ink); color: #fff; }
.badge-past    { background: var(--glass2); color: var(--muted); border: 1px solid var(--border2); }
.badge-locked  { background: rgba(224,64,64,.12); color: var(--red); }

/* ── SCORE STRIP ── */
.score-strip {
  flex-shrink: 0;
  display: flex; align-items: center; gap: .75rem;
  padding: .7rem 1.2rem;
  background: var(--glass);
  backdrop-filter: blur(20px) saturate(1.6);
  -webkit-backdrop-filter: blur(20px) saturate(1.6);
  border-bottom: 1px solid var(--border);
}

.ring-wrap { position: relative; width: 54px; height: 54px; flex-shrink: 0; }
.ring-wrap svg { transform: rotate(-90deg); width: 54px; height: 54px; }
.ring-bg   { fill: none; stroke: rgba(0,0,0,.08); stroke-width: 5; }
.ring-fill {
  fill: none; stroke-width: 5; stroke-linecap: round;
  stroke-dasharray: 132; stroke-dashoffset: 132;
  transition: stroke-dashoffset .8s cubic-bezier(.4,0,.2,1), stroke .4s;
}
.ring-inner {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.ring-pct { font-family: 'DM Serif Display', serif; font-size: .9rem; line-height: 1; color: var(--ink); }
.ring-lbl { font-size: .42rem; color: var(--muted); letter-spacing: .08em; text-transform: uppercase; }

.score-info { flex: 1; min-width: 0; }
.score-grade { font-family: 'DM Serif Display', serif; font-size: .95rem; color: var(--ink); margin-bottom: .15rem; }
.score-sub   { font-size: .62rem; color: var(--muted); line-height: 1.4; }

.cat-bars { display: flex; flex-direction: column; gap: .3rem; min-width: 88px; }
.cbr { display: flex; align-items: center; gap: .35rem; }
.cbr-l { font-size: .5rem; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; width: 10px; }
.cbr-t { flex: 1; height: 3px; background: rgba(0,0,0,.07); border-radius: 2px; overflow: hidden; }
.cbr-f { height: 100%; border-radius: 2px; transition: width .5s; }
.cbr-v { font-size: .5rem; color: var(--muted); width: 16px; text-align: right; }

/* ── SCROLL ── */
.scroll-area {
  flex: 1; overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
}

/* ── SECTIONS ── */
.section { display: none; padding: 1rem 1rem calc(var(--nav-h) + var(--safe-b) + 1.5rem); }
.section.active { display: block; animation: fadeUp .25s ease; }
@keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

/* ── GLASS CARD ── */
.glass-card {
  background: var(--glass);
  backdrop-filter: blur(20px) saturate(1.6);
  -webkit-backdrop-filter: blur(20px) saturate(1.6);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow-glass);
  overflow: hidden;
}

.glass-card2 {
  background: var(--glass2);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,.5);
  border-radius: var(--radius-s);
  box-shadow: var(--shadow-card);
}

/* ── CATEGORY BLOCK ── */
.cat-block { margin-bottom: 1.2rem; }
.cat-head { display: flex; align-items: center; gap: .5rem; margin-bottom: .65rem; padding: 0 .15rem; }
.cat-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.cat-label { font-size: .65rem; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; }
.cat-pts { margin-left: auto; font-size: .6rem; color: var(--muted); }

.habits-row { display: grid; grid-template-columns: 1fr 1fr; gap: .55rem; }

/* ── HABIT CARD (grid) ── */
.h-card {
  background: var(--glass);
  backdrop-filter: blur(16px) saturate(1.5);
  -webkit-backdrop-filter: blur(16px) saturate(1.5);
  border: 1px solid var(--border);
  border-radius: var(--radius-s);
  padding: .85rem .9rem;
  cursor: pointer;
  transition: transform .15s, box-shadow .15s;
  box-shadow: var(--shadow-card);
  user-select: none;
  position: relative; overflow: hidden;
}
.h-card::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,.3) 0%, transparent 60%);
  pointer-events: none;
}
.h-card:active { transform: scale(.96); }
.h-card.done {
  border-color: rgba(42,122,64,.35);
  background: rgba(42,122,64,.08);
}
.h-card.locked { opacity: .55; cursor: not-allowed; }

.hc-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: .55rem; }
.hc-icon { font-size: 1.25rem; }
.hc-chk {
  width: 20px; height: 20px; border-radius: 50%;
  border: 1.5px solid var(--faint);
  display: flex; align-items: center; justify-content: center;
  font-size: .6rem; color: transparent; transition: all .2s;
}
.h-card.done .hc-chk { background: var(--green); border-color: var(--green); color: #fff; }
.hc-name { font-size: .76rem; font-weight: 600; color: var(--ink); margin-bottom: .12rem; line-height: 1.25; }
.hc-pts  { font-size: .58rem; color: var(--muted); }
.hc-month { position: absolute; bottom: .6rem; right: .75rem; font-size: .62rem; font-weight: 600; color: var(--muted); }

/* ── PLANET HABIT ROW ── */
.p-section-head {
  display: flex; align-items: center; gap: .55rem;
  padding: .5rem .75rem; border-radius: 10px;
  font-size: .62rem; font-weight: 700; letter-spacing: .09em; text-transform: uppercase;
  margin-bottom: .55rem;
}

.p-row {
  display: flex; align-items: center; gap: .65rem;
  padding: .75rem .9rem;
  background: var(--glass);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border: 1px solid var(--border);
  border-radius: var(--radius-s);
  margin-bottom: .45rem;
  cursor: pointer;
  transition: transform .12s;
  box-shadow: var(--shadow-card);
  user-select: none;
  position: relative; overflow: hidden;
}
.p-row::before {
  content:''; position:absolute; inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.25) 0%,transparent 55%);
  pointer-events:none;
}
.p-row:active { transform: scale(.98); }
.p-row.done { background: rgba(42,122,64,.07); border-color: rgba(42,122,64,.3); }
.p-row.locked { opacity: .5; cursor: not-allowed; }

.pr-chk {
  width: 22px; height: 22px; border-radius: 7px;
  border: 1.5px solid var(--faint);
  display: flex; align-items: center; justify-content: center;
  font-size: .65rem; color: transparent;
  flex-shrink: 0; transition: all .2s;
}
.p-row.done .pr-chk { background: var(--green); border-color: var(--green); color: #fff; }
.pr-info { flex: 1; min-width: 0; }
.pr-name { font-size: .78rem; font-weight: 600; color: var(--ink); }
.pr-meta { font-size: .58rem; color: var(--muted); margin-top: .1rem; line-height: 1.3; }
.pr-month { flex-shrink: 0; text-align: center; min-width: 36px; }
.pr-mnum  { font-size: .9rem; font-weight: 700; line-height: 1; }
.pr-mlbl  { font-size: .48rem; color: var(--muted); letter-spacing: .04em; }

/* ── PLANET STATE CARDS ── */
.ps-card {
  margin-bottom: .75rem;
  padding: .9rem 1rem;
  background: var(--glass);
  backdrop-filter: blur(20px) saturate(1.5);
  -webkit-backdrop-filter: blur(20px) saturate(1.5);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow-glass);
  position: relative; overflow: hidden;
}
.ps-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:3px;
  background: currentColor; opacity: .4;
}
.ps-head { display: flex; align-items: center; gap: .6rem; margin-bottom: .3rem; }
.ps-sym  { font-size: 1.05rem; font-weight: 700; }
.ps-title { font-size: .82rem; font-weight: 600; color: var(--ink); }
.ps-sub  { font-size: .6rem; color: var(--muted); margin-bottom: .65rem; line-height: 1.4; }
.ps-score-row { display: flex; align-items: center; gap: .5rem; margin-bottom: .6rem; }
.ps-score-lbl { font-size: .58rem; color: var(--muted); }
.ps-score-val { font-family: 'DM Serif Display', serif; font-size: .9rem; font-weight: 600; }
.ps-opts { display: flex; flex-wrap: wrap; gap: .35rem; }
.ps-opt {
  padding: .3rem .65rem; border-radius: 100px;
  border: 1.5px solid rgba(0,0,0,.1);
  background: var(--glass2); color: var(--muted);
  font-family: 'DM Sans', sans-serif; font-size: .62rem;
  cursor: pointer; transition: all .15s;
  backdrop-filter: blur(8px);
}
.ps-opt:active { transform: scale(.95); }
.ps-opt.sel { font-weight: 600; color: var(--ink); }

/* ── TASKS ── */
.tasks-wrap {
  background: var(--glass);
  backdrop-filter: blur(20px) saturate(1.5);
  -webkit-backdrop-filter: blur(20px) saturate(1.5);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow-glass);
  overflow: hidden;
}
.tasks-head {
  padding: .8rem 1rem;
  border-bottom: 1px solid rgba(255,255,255,.5);
  display: flex; justify-content: space-between; align-items: center;
}
.tasks-title { font-family: 'DM Serif Display', serif; font-size: .95rem; color: var(--ink); }
.tasks-meta  { font-size: .62rem; color: var(--muted); }
.task-add-wrap { padding: .65rem 1rem; border-bottom: 1px solid rgba(255,255,255,.5); }
.task-add-row { display: flex; gap: .45rem; margin-bottom: .45rem; }
.task-inp {
  flex: 1; background: rgba(255,255,255,.5); border: 1px solid rgba(255,255,255,.7);
  border-radius: 10px; padding: .52rem .8rem;
  font-family: 'DM Sans', sans-serif; font-size: .8rem; color: var(--ink);
  outline: none; transition: border-color .2s; -webkit-appearance: none;
}
.task-inp:focus { border-color: rgba(0,0,0,.2); }
.task-inp::placeholder { color: var(--muted); }
.task-add-btn {
  padding: .52rem .9rem; background: var(--ink); color: #fff;
  border: none; border-radius: 10px;
  font-family: 'DM Sans', sans-serif; font-size: .75rem; font-weight: 600;
  cursor: pointer; white-space: nowrap;
}
.task-add-btn:active { opacity: .8; }
.task-cats { display: flex; gap: .35rem; }
.cat-chip {
  padding: .26rem .65rem; border: 1.5px solid rgba(0,0,0,.1);
  border-radius: 100px; font-size: .62rem; font-weight: 500;
  background: var(--glass2); color: var(--muted); cursor: pointer; transition: all .15s;
}
.cat-chip.active { background: var(--ink); color: #fff; border-color: var(--ink); }
.task-item {
  display: flex; align-items: center; gap: .65rem;
  padding: .65rem 1rem; border-bottom: 1px solid rgba(255,255,255,.5);
  transition: background .15s;
}
.task-item:last-child { border-bottom: none; }
.task-item.done .task-text { text-decoration: line-through; color: var(--muted); }
.task-cb {
  width: 19px; height: 19px; border-radius: 5px;
  border: 1.5px solid var(--faint); background: none;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: .62rem; color: transparent; flex-shrink: 0; transition: all .2s;
}
.task-item.done .task-cb { background: var(--green); border-color: var(--green); color: #fff; }
.task-text { flex: 1; font-size: .78rem; color: var(--ink2); line-height: 1.35; }
.task-tag { font-size: .55rem; padding: .12rem .42rem; border-radius: 100px; font-weight: 600; flex-shrink: 0; }
.tag-work  { background: rgba(32,144,200,.12); color: var(--mercury); }
.tag-learn { background: rgba(208,96,168,.12); color: var(--venus); }
.tag-other { background: rgba(0,0,0,.06); color: var(--muted); }
.task-del  { background: none; border: none; color: var(--faint); cursor: pointer; font-size: .8rem; padding: .2rem; flex-shrink: 0; }
.task-del:active { color: var(--red); }
.no-tasks { padding: 1.5rem; text-align: center; color: var(--muted); font-size: .75rem; font-style: italic; }

/* ── JOURNAL ── */
.j-block {
  margin-bottom: .7rem; padding: .9rem 1rem;
  background: var(--glass);
  backdrop-filter: blur(18px) saturate(1.5);
  -webkit-backdrop-filter: blur(18px) saturate(1.5);
  border: 1px solid var(--border);
  border-radius: var(--radius-s);
  box-shadow: var(--shadow-card);
}
.j-label { font-size: .62rem; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; color: var(--ink2); margin-bottom: .2rem; }
.j-hint  { font-size: .58rem; color: var(--muted); margin-bottom: .5rem; line-height: 1.4; font-style: italic; }
.j-input {
  width: 100%; background: rgba(255,255,255,.5); border: 1px solid rgba(255,255,255,.7);
  border-radius: 10px; padding: .52rem .8rem;
  color: var(--ink); font-family: 'DM Sans', sans-serif; font-size: .8rem;
  resize: none; outline: none; transition: border-color .2s; -webkit-appearance: none;
}
.j-input:focus { border-color: rgba(0,0,0,.2); }
.j-input::placeholder { color: var(--muted); }
.j-opts { display: flex; flex-wrap: wrap; gap: .35rem; margin-top: .35rem; }
.j-opt {
  padding: .28rem .65rem; border-radius: 100px;
  border: 1.5px solid rgba(0,0,0,.1); background: var(--glass2);
  color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: .62rem;
  cursor: pointer; transition: all .15s; backdrop-filter: blur(6px);
}
.j-opt.sel { font-weight: 600; color: var(--ink); }
.j-opt:active { transform: scale(.95); }

/* ── SECTION TITLE ── */
.sec-title {
  font-family: 'DM Serif Display', serif;
  font-size: 1rem; color: var(--ink);
  margin: 1rem 0 .7rem .1rem;
  letter-spacing: -.01em;
}
.sec-title:first-child { margin-top: 0; }

/* ── STATS ROW ── */
.stats-row { display: grid; grid-template-columns: repeat(3,1fr); gap: .55rem; margin-bottom: .9rem; }
.stat-box {
  padding: .85rem .8rem; text-align: center;
  background: var(--glass);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  border: 1px solid var(--border); border-radius: var(--radius-s);
  box-shadow: var(--shadow-card);
}
.stat-val { font-family: 'DM Serif Display', serif; font-size: 1.5rem; line-height: 1; color: var(--ink); }
.stat-lbl { font-size: .55rem; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; margin-top: .2rem; }

/* ── REPORT TABLE ── */
.report-glass {
  background: var(--glass);
  backdrop-filter: blur(18px) saturate(1.5);
  -webkit-backdrop-filter: blur(18px) saturate(1.5);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow-glass);
  overflow: hidden; margin-bottom: .9rem;
}
.rg-title { padding: .7rem 1rem; border-bottom: 1px solid rgba(255,255,255,.5); font-family: 'DM Serif Display', serif; font-size: .9rem; color: var(--ink); }
.rg-body  { padding: .75rem 1rem; }
.rt-row   { display: flex; align-items: center; gap: .6rem; padding: .38rem 0; border-bottom: 1px solid rgba(0,0,0,.05); }
.rt-row:last-child { border-bottom: none; }
.rt-day   { font-size: .72rem; font-weight: 600; width: 28px; flex-shrink: 0; color: var(--ink2); }
.rt-bar-t { flex: 1; height: 5px; background: rgba(0,0,0,.07); border-radius: 3px; overflow: hidden; }
.rt-bar-f { height: 100%; border-radius: 3px; transition: width .5s; }
.rt-pct   { font-size: .65rem; color: var(--muted); width: 28px; text-align: right; }

/* ── CONSISTENCY ── */
.con-glass {
  background: var(--glass);
  backdrop-filter: blur(18px) saturate(1.5);
  -webkit-backdrop-filter: blur(18px) saturate(1.5);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: .9rem 1rem;
  box-shadow: var(--shadow-glass);
}
.con-title { font-family: 'DM Serif Display', serif; font-size: .9rem; color: var(--ink); margin-bottom: .8rem; }
.con-row { display: flex; align-items: center; gap: .55rem; margin-bottom: .55rem; }
.con-row:last-child { margin-bottom: 0; }
.con-icon { font-size: .85rem; width: 18px; text-align: center; }
.con-name { font-size: .67rem; width: 88px; flex-shrink: 0; color: var(--ink2); }
.con-t    { flex: 1; height: 3px; background: rgba(0,0,0,.07); border-radius: 2px; overflow: hidden; }
.con-f    { height: 100%; border-radius: 2px; transition: width .5s; }
.con-pct  { font-size: .62rem; color: var(--muted); width: 28px; text-align: right; }

/* ── MONTH CAL ── */
.month-nav-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: .9rem; }
.mnav-btn {
  padding: .38rem .9rem;
  background: var(--glass); border: 1px solid var(--border); border-radius: 100px;
  font-family: 'DM Sans', sans-serif; font-size: .7rem; font-weight: 500;
  color: var(--ink2); cursor: pointer;
  backdrop-filter: blur(10px); transition: all .15s;
}
.mnav-btn:active { transform: scale(.96); }
.mnav-title { font-family: 'DM Serif Display', serif; font-size: 1rem; color: var(--ink); letter-spacing: -.01em; }

.cal-glass {
  background: var(--glass);
  backdrop-filter: blur(18px) saturate(1.5);
  -webkit-backdrop-filter: blur(18px) saturate(1.5);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1rem;
  box-shadow: var(--shadow-glass);
  margin-bottom: .9rem;
}
.cal-dhr   { display: grid; grid-template-columns: repeat(7,1fr); gap: .2rem; margin-bottom: .4rem; }
.cal-dh    { text-align: center; font-size: .54rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; padding: .2rem 0; }
.cal-cells { display: grid; grid-template-columns: repeat(7,1fr); gap: .25rem; }
.cal-cell  {
  aspect-ratio: 1; border-radius: 8px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  font-size: .7rem; color: var(--muted);
}
.cal-cell.empty   { opacity: 0; pointer-events: none; }
.cal-cell.has-data { background: rgba(255,255,255,.5); border: 1px solid rgba(255,255,255,.7); color: var(--ink2); }
.cal-cell.today-cell { background: var(--ink); color: #fff; font-weight: 700; }
.cal-cell.future  { color: var(--faint); }
.cal-dot { width: 4px; height: 4px; border-radius: 50%; margin-top: 2px; }

/* ── MONTHLY TABLE ── */
.mt-glass {
  background: var(--glass);
  backdrop-filter: blur(18px) saturate(1.5);
  -webkit-backdrop-filter: blur(18px) saturate(1.5);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow-glass);
  margin-bottom: .9rem;
}
.mt-head {
  display: grid; grid-template-columns: 1fr 44px 68px;
  gap: .5rem; padding: .55rem .9rem;
  background: rgba(255,255,255,.3);
  border-bottom: 1px solid rgba(255,255,255,.5);
}
.mt-col { font-size: .56rem; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); }
.mt-row {
  display: grid; grid-template-columns: 1fr 44px 68px;
  gap: .5rem; padding: .58rem .9rem;
  border-bottom: 1px solid rgba(255,255,255,.45);
  align-items: center;
}
.mt-row:last-child { border-bottom: none; }
.mt-name { font-size: .7rem; color: var(--ink2); display: flex; align-items: center; gap: .35rem; }
.mt-cnt  { font-size: .82rem; font-weight: 700; text-align: center; }
.mt-bar-wrap { display: flex; align-items: center; gap: .35rem; }
.mt-bar-t { flex: 1; height: 4px; background: rgba(0,0,0,.07); border-radius: 2px; overflow: hidden; }
.mt-bar-f { height: 100%; border-radius: 2px; transition: width .5s; }
.mt-pct   { font-size: .56rem; color: var(--muted); width: 24px; text-align: right; }

/* ── STREAKS ── */
.streaks-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .55rem; }
.streak-glass {
  background: var(--glass);
  backdrop-filter: blur(16px) saturate(1.5);
  -webkit-backdrop-filter: blur(16px) saturate(1.5);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: .9rem;
  box-shadow: var(--shadow-card);
  text-align: center;
  position: relative; overflow: hidden;
}
.streak-glass::before {
  content:''; position:absolute; inset:0;
  background:linear-gradient(145deg,rgba(255,255,255,.4) 0%,transparent 55%);
  pointer-events:none;
}
.sg-icon { font-size: 1.4rem; margin-bottom: .25rem; }
.sg-val  { font-family: 'DM Serif Display', serif; font-size: 2rem; color: var(--ink); line-height: 1; }
.sg-name { font-size: .58rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-top: .15rem; }
.sg-fire { font-size: .68rem; margin-top: .2rem; min-height: .9rem; }
.sg-best { font-size: .56rem; color: var(--faint); margin-top: .15rem; }

/* ── BOTTOM NAV ── */
.bottom-nav {
  flex-shrink: 0;
  display: flex;
  background: var(--glass);
  backdrop-filter: blur(24px) saturate(1.8);
  -webkit-backdrop-filter: blur(24px) saturate(1.8);
  border-top: 1px solid var(--border);
  padding-bottom: calc(.4rem + var(--safe-b));
  z-index: 20;
  box-shadow: 0 -4px 20px rgba(0,0,0,.06);
}
.nav-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  padding: .55rem .2rem .35rem;
  background: none; border: none; cursor: pointer;
  color: var(--muted); font-family: 'DM Sans', sans-serif;
  font-size: .5rem; font-weight: 500; letter-spacing: .04em; text-transform: uppercase;
  gap: .2rem; transition: color .15s;
}
.nav-btn.active { color: var(--ink); }
.nav-icon { font-size: 1.2rem; line-height: 1; }
.nav-btn.active .nav-icon { filter: drop-shadow(0 2px 6px rgba(0,0,0,.15)); }

/* ── EXPORT MODAL ── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.25);
  backdrop-filter: blur(8px);
  z-index: 200; display: none;
  align-items: flex-end; justify-content: center;
}
.modal-overlay.open { display: flex; animation: fadeIn .2s ease; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
.modal {
  background: var(--glass);
  backdrop-filter: blur(30px) saturate(2);
  -webkit-backdrop-filter: blur(30px) saturate(2);
  border: 1px solid var(--border);
  border-radius: 24px 24px 0 0;
  width: 100%; max-width: 480px;
  padding-bottom: calc(1rem + var(--safe-b));
  animation: sheetUp .3s cubic-bezier(.34,1.56,.64,1);
  overflow: hidden;
  box-shadow: 0 -8px 40px rgba(0,0,0,.12);
}
@keyframes sheetUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
.modal-handle { width: 36px; height: 4px; border-radius: 2px; background: rgba(0,0,0,.15); margin: .75rem auto 0; }
.modal-head   { padding: .9rem 1.2rem .7rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,.5); }
.modal-title  { font-family: 'DM Serif Display', serif; font-size: 1rem; color: var(--ink); }
.modal-close  { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1rem; }
.modal-body   { padding: .9rem 1.2rem; display: flex; flex-direction: column; gap: .55rem; }
.exp-btn {
  display: flex; align-items: center; gap: .75rem;
  padding: .85rem 1rem;
  background: rgba(255,255,255,.5); border: 1px solid var(--border);
  border-radius: var(--radius-s); cursor: pointer;
  font-family: 'DM Sans', sans-serif; font-size: .78rem; color: var(--ink2);
  font-weight: 500; text-align: left; transition: background .15s;
  backdrop-filter: blur(8px);
}
.exp-btn:active { background: rgba(255,255,255,.7); }
.exp-icon { font-size: 1.1rem; width: 24px; text-align: center; }
.exp-name { font-weight: 600; font-size: .78rem; color: var(--ink); }
.exp-desc { font-size: .6rem; color: var(--muted); margin-top: .06rem; }

/* ── LOADING ── */
.loading-screen {
  position: fixed; inset: 0; z-index: 500;
  background: var(--bg);
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: .75rem;
  transition: opacity .5s;
}
.loading-screen.hidden { opacity: 0; pointer-events: none; }
.loading-brand { font-family: 'DM Serif Display', serif; font-size: 1.6rem; color: var(--ink); letter-spacing: -.02em; }
.loading-brand em { font-style: italic; color: var(--muted); }
.l-dots { display: flex; gap: .35rem; }
.l-dots span { width: 5px; height: 5px; border-radius: 50%; background: var(--faint); animation: dotPop 1.2s infinite; }
.l-dots span:nth-child(2){animation-delay:.2s} .l-dots span:nth-child(3){animation-delay:.4s}
@keyframes dotPop{0%,100%{background:var(--faint)}50%{background:var(--ink)}}

/* ── TOAST ── */
.toast {
  position: fixed; bottom: calc(var(--nav-h) + var(--safe-b) + .8rem); left: 50%;
  transform: translateX(-50%) translateY(40px);
  background: rgba(28,25,23,.88); color: #fff;
  backdrop-filter: blur(16px);
  padding: .45rem 1.2rem; border-radius: 100px;
  font-size: .72rem; font-weight: 500; z-index: 300;
  transition: transform .25s cubic-bezier(.34,1.56,.64,1);
  white-space: nowrap; pointer-events: none; letter-spacing: .02em;
}
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.err  { background: rgba(224,64,64,.9); }

/* ── DESKTOP ── */
@media(min-width:520px){
  html { background: #ddd9d2; display:flex; justify-content:center; align-items:center; min-height:100vh; }
  .app { height: 90vh; border-radius: 44px; overflow: hidden; box-shadow: 0 30px 80px rgba(0,0,0,.2), 0 0 0 1px rgba(255,255,255,.3); }
  body::before { border-radius: 44px; }
}
</style>
</head>
<body>

<div class="loading-screen" id="loadingScreen">
  <div class="loading-brand">Vijay <em>OS</em></div>
  <div class="l-dots"><span></span><span></span><span></span></div>
</div>

<div class="app">

  <!-- Topbar -->
  <div class="topbar">
    <div class="brand">Vijay <em>OS</em></div>
    <div class="topbar-right">
      <div class="sync-pill">
        <div class="sync-dot" id="syncDot"></div>
        <span id="syncLbl">connecting</span>
      </div>
      <button class="glass-btn" onclick="openExport()">↑</button>
    </div>
  </div>

  <!-- Date Nav -->
  <div class="date-nav">
    <button class="dnav-btn" onclick="changeDate(-1)">◂</button>
    <div class="date-center">
      <div class="date-main" id="dateMain"></div>
      <div class="date-sub"  id="dateSub"></div>
      <div id="dateBadge"></div>
    </div>
    <button class="dnav-btn" id="dnNext" onclick="changeDate(1)">▸</button>
  </div>

  <!-- Score Strip -->
  <div class="score-strip">
    <div class="ring-wrap">
      <svg viewBox="0 0 50 50">
        <circle class="ring-bg" cx="25" cy="25" r="21"/>
        <circle class="ring-fill" id="ringFill" cx="25" cy="25" r="21"/>
      </svg>
      <div class="ring-inner">
        <div class="ring-pct" id="ringPct">0%</div>
        <div class="ring-lbl">score</div>
      </div>
    </div>
    <div class="score-info">
      <div class="score-grade" id="scoreGrade">—</div>
      <div class="score-sub"   id="scoreSub">Loading…</div>
    </div>
    <div class="cat-bars" id="catBars"></div>
  </div>

  <!-- Scroll Area -->
  <div class="scroll-area" id="scrollArea">

    <!-- HABITS -->
    <div class="section active" id="tab-today">
      <div class="cat-block">
        <div class="cat-head"><div class="cat-dot" style="background:var(--health)"></div><div class="cat-label" style="color:var(--health)">Health & Body</div><div class="cat-pts">25 pts</div></div>
        <div class="habits-row" id="healthHabits"></div>
      </div>
      <div class="cat-block">
        <div class="cat-head"><div class="cat-dot" style="background:var(--wellness)"></div><div class="cat-label" style="color:var(--wellness)">Wellness</div><div class="cat-pts">25 pts</div></div>
        <div class="habits-row" id="wellnessHabits"></div>
      </div>
      <div class="cat-block">
        <div class="cat-head"><div class="cat-dot" style="background:var(--tasks)"></div><div class="cat-label" style="color:var(--tasks)">Tasks</div><div class="cat-pts">50 pts</div></div>
        <div class="tasks-wrap">
          <div class="tasks-head"><div class="tasks-title">Today's Tasks</div><div class="tasks-meta" id="tasksMeta">0 / 0</div></div>
          <div class="task-add-wrap" id="taskAddWrap">
            <div class="task-add-row">
              <input class="task-inp" id="taskInp" placeholder="Add a task…" onkeydown="if(event.key==='Enter')addTask()">
              <button class="task-add-btn" onclick="addTask()">Add</button>
            </div>
            <div class="task-cats">
              <div class="cat-chip active" data-val="work"  onclick="selectCat(this)">Work</div>
              <div class="cat-chip"        data-val="learn" onclick="selectCat(this)">Learning</div>
              <div class="cat-chip"        data-val="other" onclick="selectCat(this)">Other</div>
            </div>
          </div>
          <div class="task-list" id="taskList"></div>
        </div>
      </div>
    </div>

    <!-- PLANETS -->
    <div class="section" id="tab-planets">
      <div class="sec-title">Planet Habits</div>
      <div id="planetHabits"></div>
      <div class="sec-title">Planet State Tracker</div>
      <div id="planetStates"></div>
    </div>

    <!-- JOURNAL -->
    <div class="section" id="tab-journal">
      <div id="journalContent"></div>
    </div>

    <!-- WEEK -->
    <div class="section" id="tab-week">
      <div class="stats-row" id="weekStats"></div>
      <div class="report-glass">
        <div class="rg-title">This Week</div>
        <div class="rg-body" id="weekBars"></div>
      </div>
      <div class="con-glass" id="weekCon"></div>
    </div>

    <!-- MONTH -->
    <div class="section" id="tab-month">
      <div class="month-nav-row">
        <button class="mnav-btn" onclick="changeViewMonth(-1)">← Prev</button>
        <div class="mnav-title" id="mnTitle"></div>
        <button class="mnav-btn" onclick="changeViewMonth(1)">Next →</button>
      </div>
      <div class="stats-row" id="monthStats"></div>
      <div class="cal-glass">
        <div class="cal-dhr" id="calHdr"></div>
        <div class="cal-cells" id="calCells"></div>
      </div>
      <div class="mt-glass" id="monthlyTable"></div>
      <div class="con-glass" id="monthCon"></div>
    </div>

    <!-- STREAKS -->
    <div class="section" id="tab-streaks">
      <div class="sec-title">Current Streaks</div>
      <div class="streaks-grid" id="streaksGrid"></div>
    </div>

  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <button class="nav-btn active" onclick="switchTab('today',this)"><span class="nav-icon">☀️</span>Habits</button>
    <button class="nav-btn"        onclick="switchTab('planets',this)"><span class="nav-icon">🪐</span>Planets</button>
    <button class="nav-btn"        onclick="switchTab('journal',this)"><span class="nav-icon">📓</span>Journal</button>
    <button class="nav-btn"        onclick="switchTab('week',this)"><span class="nav-icon">📊</span>Week</button>
    <button class="nav-btn"        onclick="switchTab('month',this)"><span class="nav-icon">📅</span>Month</button>
    <button class="nav-btn"        onclick="switchTab('streaks',this)"><span class="nav-icon">🔥</span>Streaks</button>
  </nav>
</div>

<!-- Export Sheet -->
<div class="modal-overlay" id="exportModal" onclick="if(event.target===this)closeExport()">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-head">
      <div class="modal-title">Export Data</div>
      <button class="modal-close" onclick="closeExport()">✕</button>
    </div>
    <div class="modal-body">
      <button class="exp-btn" onclick="exportJSON()"><span class="exp-icon">{ }</span><div><div class="exp-name">JSON — Full Raw Data</div><div class="exp-desc">All habits, tasks, journal, planet states</div></div></button>
      <button class="exp-btn" onclick="exportCSV()"><span class="exp-icon">⊞</span><div><div class="exp-name">CSV — Daily Summary</div><div class="exp-desc">Open in Excel or Google Sheets</div></div></button>
      <button class="exp-btn" onclick="exportReport()"><span class="exp-icon">📋</span><div><div class="exp-name">Text Report</div><div class="exp-desc">Human-readable full log</div></div></button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp }     from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, set, onValue } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const app = initializeApp({ databaseURL:'https://vijay-habits-default-rtdb.firebaseio.com' });
const db  = getDatabase(app);
const ROOT = 'vijay';

// ── PERSONAL HABITS ───────────────────────────────────────────────────────────
const HEALTH_HABITS = [
  { id:'workout',  icon:'💪', name:'Workout',       pts:7,  color:'var(--health)'   },
  { id:'diet',     icon:'🥗', name:'Healthy Diet',  pts:6,  color:'var(--health)'   },
  { id:'no_milk',  icon:'🥛', name:'No Milk',       pts:6,  color:'var(--health)'   },
  { id:'no_sugar', icon:'🚫', name:'No Sugar/Junk', pts:6,  color:'var(--health)'   },
];
const WELLNESS_HABITS = [
  { id:'meditation', icon:'🪷', name:'Meditation',  pts:9,  color:'var(--wellness)' },
  { id:'no_fap',     icon:'🧘', name:'No Fap',      pts:9,  color:'var(--wellness)' },
  { id:'calm_kind',  icon:'🌿', name:'Calm & Kind', pts:7,  color:'var(--wellness)' },
];
const ALL_PERSONAL = [...HEALTH_HABITS, ...WELLNESS_HABITS];
const MAX_HEALTH = HEALTH_HABITS.reduce((s,h)=>s+h.pts,0);
const MAX_WELL   = WELLNESS_HABITS.reduce((s,h)=>s+h.pts,0);
const MAX_TASK   = 50;

// ── PLANET CONFIG ─────────────────────────────────────────────────────────────
const PLANET_META = {
  jupiter:{ label:'Jupiter', sym:'♃', cv:'var(--jupiter)', hx:'#e8a020' },
  mars:   { label:'Mars',    sym:'♂', cv:'var(--mars)',    hx:'#e04040' },
  venus:  { label:'Venus',   sym:'♀', cv:'var(--venus)',   hx:'#d060a8' },
  mercury:{ label:'Mercury', sym:'☿', cv:'var(--mercury)', hx:'#2090c8' },
  saturn: { label:'Saturn',  sym:'♄', cv:'var(--saturn)',  hx:'#7878a8' },
  sun:    { label:'Sun',     sym:'☉', cv:'var(--sun)',     hx:'#e87020' },
};

const PLANET_HABITS = [
  { id:'ph_med',   icon:'🧠', name:'Meditation',        planet:'jupiter', pts:8,  meta:"Observe, don't react" },
  { id:'ph_mornq', icon:'🌅', name:'Morning 3 Questions',planet:'jupiter', pts:7,  meta:'Priority · lead · say NO' },
  { id:'ph_eod',   icon:'🌙', name:'End-of-Day Review',  planet:'jupiter', pts:5,  meta:'5 min — what moved forward?' },
  { id:'ph_outreach',icon:'📞',name:'1 Outreach Action', planet:'mars',    pts:10, meta:'DM, call, follow-up' },
  { id:'ph_workout',icon:'⚡', name:'Workout',           planet:'mars',    pts:8,  meta:'Body = Mars fuel' },
  { id:'ph_creative',icon:'🎨',name:'Creative Block',    planet:'venus',   pts:10, meta:'Concept, edit, visual' },
  { id:'ph_content', icon:'📱',name:'1 Content Piece',   planet:'mercury', pts:8,  meta:'Post, story, reel' },
  { id:'ph_learn',   icon:'📚',name:'30 min Brand Study', planet:'mercury', pts:7,  meta:'1 case study' },
  { id:'ph_admin',   icon:'📋',name:'Admin / Finance',    planet:'saturn',  pts:8,  meta:'Invoice, budget, process' },
  { id:'ph_identity',icon:'👑',name:'Identity Alignment', planet:'sun',     pts:9,  meta:'Show up as brand filmmaker' },
];

// Planet state: [state label, pts gained (positive), pts lost (negative)]
// Positive states = good behaviour = gain pts. Negative = lose pts.
const PLANET_STATES = {
  jupiter:[
    { label:'Clarity & Direction',     pts:5,  good:true  },
    { label:'Calm Observer',           pts:3,  good:true  },
    { label:'Overthinking Purpose',    pts:-3, good:false },
    { label:'Scattered / No Priority', pts:-5, good:false },
  ],
  mars:[
    { label:'Focused Execution',  pts:5,  good:true  },
    { label:'Action With Plan',   pts:3,  good:true  },
    { label:'Angry / Impatient',  pts:-3, good:false },
    { label:'Paralyzed / No Drive',pts:-5, good:false },
  ],
  venus:[

// Max planet habit pts
const MAX_PLANET_HABITS = PLANET_HABITS.reduce((s,h)=>s+h.pts,0);
// Max planet state pts (sum of all positive states)
const MAX_PLANET_STATES = Object.values(PLANET_STATES).reduce((s,states)=>{
  return s + states.filter(st=>st.good).reduce((ss,st)=>Math.max(ss,st.pts),0);
},0);

// ── STATE ─────────────────────────────────────────────────────────────────────
let cache = {}, viewDate = new Date(), viewMonth = new Date();
let selectedCat = 'work', currentTab = 'today';

const fmt      = d => d.toISOString().slice(0,10);
const todayStr = () => fmt(new Date());
const isToday  = d => fmt(d) === todayStr();
const isFuture = d => fmt(d) > todayStr();
const isLoggable = d => {
  const diff = (new Date(todayStr()) - new Date(fmt(d))) / 86400000;
  return diff >= 0 && diff <= 3;
};

function setSyncDot(s, lbl) {
  document.getElementById('syncDot').className = 'sync-dot ' + s;

function getDay(date) {
  return cache[date] || { habits:{}, pHabits:{}, tasks:[], planetStates:{}, journal:{} };
}

async function writeDay(date, day) {

// ── SCORING ───────────────────────────────────────────────────────────────────
function calcPersonalScore(date) {
  const day = getDay(date);
  let hp=0, wp=0;
  HEALTH_HABITS.forEach(h => { if(day.habits?.[h.id]) hp += h.pts; });
  WELLNESS_HABITS.forEach(h => { if(day.habits?.[h.id]) wp += h.pts; });
  const tasks = Array.isArray(day.tasks) ? day.tasks.filter(Boolean) : [];
  const done  = tasks.filter(t=>t.done).length;
  const tp    = tasks.length ? Math.round((done/tasks.length)*MAX_TASK) : 0;
  return { hp, wp, tp, total:hp+wp+tp, pct:hp+wp+tp, done, total_tasks:tasks.length };
}

function calcPlanetScore(date) {
  const day = getDay(date);
  // Planet habits
  let php = 0;
  PLANET_HABITS.forEach(h => { if(day.pHabits?.[h.id]) php += h.pts; });
  // Planet states
  let psp = 0;
  Object.entries(PLANET_STATES).forEach(([planet, states]) => {
    const sel = day.planetStates?.[planet];
    if(sel) {
      const found = states.find(s=>s.label===sel);
      if(found) psp += found.pts;
    }
  });
  const maxPH  = MAX_PLANET_HABITS;
  const maxPS  = MAX_PLANET_STATES;
  const maxTot = maxPH + maxPS;
  const raw    = Math.max(0, php + psp);
  const pct    = maxTot > 0 ? Math.min(100, Math.round(raw / maxTot * 100)) : 0;
  return { php, psp, total:raw, pct, maxPH, maxPS, maxTot };
}

function grade(pct) {
  if(pct>=90) return { label:'🔥 Elite',    color:'var(--green)' };
  if(pct>=75) return { label:'💪 Strong',   color:'var(--green)' };
  if(pct>=50) return { label:'📈 Building', color:'var(--orange)' };
  if(pct>=25) return { label:'🌱 Starting', color:'var(--saturn)' };
  return             { label:'💤 Rest Day', color:'var(--muted)' };
}

function barColor(pct) {
  if(pct>=75) return 'var(--green)';
  if(pct>=50) return 'var(--mercury)';
  if(pct>=25) return 'var(--orange)';
  return 'var(--red)';
}

// ── MONTHLY COUNT ─────────────────────────────────────────────────────────────
function getMonthlyCount(habitId, isPlanet, yr, mo) {
  const year  = yr  !== undefined ? yr  : viewMonth.getFullYear();
  const month = mo  !== undefined ? mo  : viewMonth.getMonth();
  const dim   = new Date(year, month+1, 0).getDate();
  let count   = 0;
  for(let d=1; d<=dim; d++) {
    const ds  = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const day = cache[ds];
    if(!day) continue;
    if(isPlanet ? day.pHabits?.[habitId] : day.habits?.[habitId]) count++;
  }
  return count;
}

function getMonthDaysPassed(yr, mo) {
  const year  = yr !== undefined ? yr  : viewMonth.getFullYear();
  const month = mo !== undefined ? mo  : viewMonth.getMonth();
  const now   = new Date();
  if(now.getFullYear()===year && now.getMonth()===month) return now.getDate();
  if(new Date(year,month) < new Date(now.getFullYear(),now.getMonth())) return new Date(year,month+1,0).getDate();
  return 0;
}

// ── ACTIONS ───────────────────────────────────────────────────────────────────
async function togglePersonalHabit(id) {
  const ds=fmt(viewDate), day=JSON.parse(JSON.stringify(getDay(ds)));
  if(!day.habits) day.habits={};
  day.habits[id]=!day.habits[id];
  cache[ds]=day; renderAll();
  await writeDay(ds,day);
  toast(day.habits[id]?'✓ Logged':'Removed');
}

window._tPH = async id => {
  const ds=fmt(viewDate), day=JSON.parse(JSON.stringify(getDay(ds)));
  if(!day.pHabits) day.pHabits={};
  day.pHabits[id]=!day.pHabits[id];
  cache[ds]=day; renderPlanetHabits();
  await writeDay(ds,day);
  toast(day.pHabits[id]?'✓ Logged':'Removed');
};

window._setSt = async (planet, state) => {
  const ds=fmt(viewDate), day=JSON.parse(JSON.stringify(getDay(ds)));
  if(!day.planetStates) day.planetStates={};
  day.planetStates[planet] = day.planetStates[planet]===state ? null : state;
  cache[ds]=day; renderPlanetStates(); renderPlanetHabits();
  await writeDay(ds,day);
  toast('State saved');
};

window.selectCat = el => {
  document.querySelectorAll('.cat-chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active'); selectedCat=el.dataset.val;
};

window.addTask = async () => {
  if(isFuture(viewDate)||!isLoggable(viewDate)) return;
  const inp=document.getElementById('taskInp'), text=inp.value.trim();
  if(!text) return;
  const ds=fmt(viewDate), day=JSON.parse(JSON.stringify(getDay(ds)));
  if(!Array.isArray(day.tasks)) day.tasks=[];
  day.tasks.push({text,cat:selectedCat,done:false});
  cache[ds]=day; inp.value=''; renderAll();
  await writeDay(ds,day); toast('Task added');
};

window._tT = async (ds,i) => {
  const day=JSON.parse(JSON.stringify(getDay(ds)));
  if(day.tasks?.[i]) day.tasks[i].done=!day.tasks[i].done;
  cache[ds]=day; renderAll(); await writeDay(ds,day);
};

window._dT = async (ds,i) => {
  const day=JSON.parse(JSON.stringify(getDay(ds)));
  if(Array.isArray(day.tasks)) day.tasks.splice(i,1);
  cache[ds]=day; renderAll(); await writeDay(ds,day);
};

window._sJ = async (ds,key,value) => {
  const day=JSON.parse(JSON.stringify(getDay(ds)));
  if(!day.journal) day.journal={};
  day.journal[key]=value; cache[ds]=day;
  await writeDay(ds,day); toast('Saved');
};

window._sJD = async (ds,key,value) => {
  const day=JSON.parse(JSON.stringify(getDay(ds)));
  if(!day.journal) day.journal={};
  day.journal[key]=day.journal[key]===value?null:value;
  cache[ds]=day; renderJournal();
  await writeDay(ds,day); toast('Saved');
};

window.changeDate = dir => {
  const next=new Date(viewDate); next.setDate(next.getDate()+dir);
  if(fmt(next)>todayStr()) return;
  viewDate=next; renderCurrentView();
  document.getElementById('scrollArea').scrollTop=0;
};

// ── WEEK ──────────────────────────────────────────────────────────────────────
function renderWeek() {
  const now=new Date(), dow=now.getDay()===0?6:now.getDay()-1;
  const mon=new Date(now); mon.setDate(now.getDate()-dow);
  const DAY=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  let bars='', total=0, days=0, hC={};
  ALL_PERSONAL.forEach(h=>hC[h.id]=0);
  for(let i=0;i<7;i++){
    const d=new Date(mon); d.setDate(mon.getDate()+i);
    if(d>now) break; days++;
    const ds=fmt(d), s=calcPersonalScore(ds); total+=s.pct;
    const day=getDay(ds);
    ALL_PERSONAL.forEach(h=>{ if(day.habits?.[h.id]) hC[h.id]++; });
    bars+=`<div class="rt-row"><div class="rt-day">${DAY[i]}${ds===todayStr()?' ·':''}</div><div class="rt-bar-t"><div class="rt-bar-f" style="width:${s.pct}%;background:${barColor(s.pct)}"></div></div><div class="rt-pct">${s.pct}%</div></div>`;
  }
  const avg=days?Math.round(total/days):0, g=grade(avg);
  document.getElementById('weekStats').innerHTML=`
    <div class="stat-box"><div class="stat-val" style="color:${barColor(avg)}">${avg}%</div><div class="stat-lbl">Avg Score</div></div>
    <div class="stat-box"><div class="stat-val">${days}</div><div class="stat-lbl">Days</div></div>
    <div class="stat-box"><div class="stat-val" style="font-size:.9rem;color:${g.color}">${g.label.split(' ')[0]}</div><div class="stat-lbl">Grade</div></div>
  `;
  document.getElementById('weekBars').innerHTML=bars;
  renderCon('weekCon', hC, days);
}

function renderCon(id, counts, days) {
  let html='<div class="con-title">Habit Consistency</div>';
  ALL_PERSONAL.forEach(h=>{
    const pct=days?Math.round(counts[h.id]/days*100):0;
    html+=`<div class="con-row"><span class="con-icon">${h.icon}</span><span class="con-name">${h.name}</span><div class="con-t"><div class="con-f" style="width:${pct}%;background:${barColor(pct)}"></div></div><span class="con-pct">${pct}%</span></div>`;
  });
  document.getElementById(id).innerHTML=html;
}

// ── MONTH ─────────────────────────────────────────────────────────────────────
window.changeViewMonth = dir => { viewMonth.setMonth(viewMonth.getMonth()+dir); renderMonth(); };

function renderMonth() {
  const yr=viewMonth.getFullYear(), mo=viewMonth.getMonth();
  const now=new Date(), dim=new Date(yr,mo+1,0).getDate();
  const first=new Date(yr,mo,1).getDay(), off=first===0?6:first-1;
  document.getElementById('mnTitle').textContent =
    viewMonth.toLocaleDateString('en-IN',{month:'long',year:'numeric'});

  let total=0, daysT=0, hC={};
  ALL_PERSONAL.forEach(h=>hC[h.id]=0);

  // ALL days of the month (not just today)
  const DAYS=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  document.getElementById('calHdr').innerHTML=DAYS.map(d=>`<div class="cal-dh">${d}</div>`).join('');

  let cells='';
  for(let i=0;i<off;i++) cells+='<div class="cal-cell empty"></div>';
  for(let d=1;d<=dim;d++){
    const date=new Date(yr,mo,d), ds=fmt(date);
    const isT=ds===todayStr(), isF=date>now;
    const s=calcPersonalScore(ds), day=getDay(ds);
    const hasData=Object.keys(day.habits||{}).length>0||(day.tasks||[]).length>0;
    // Count ALL days that have passed (not just those with data)
    if(!isF){ daysT++; total+=s.pct; ALL_PERSONAL.forEach(h=>{ if(day.habits?.[h.id]) hC[h.id]++; }); }
    cells+=`<div class="cal-cell ${isT?'today-cell':hasData&&!isF?'has-data':''} ${isF?'future':''}">
      ${d}${hasData&&!isF?`<div class="cal-dot" style="background:${barColor(s.pct)}"></div>`:''}
    </div>`;
  }
  document.getElementById('calCells').innerHTML=cells;

  const avg=daysT?Math.round(total/daysT):0, g=grade(avg);
  document.getElementById('monthStats').innerHTML=`
    <div class="stat-box"><div class="stat-val" style="color:${barColor(avg)}">${avg}%</div><div class="stat-lbl">Avg Score</div></div>
    <div class="stat-box"><div class="stat-val">${daysT}</div><div class="stat-lbl">Days</div></div>
    <div class="stat-box"><div class="stat-val">${dim}</div><div class="stat-lbl">In Month</div></div>
  `;

  // Monthly habit count table — uses ALL days passed
  const mdp = daysT; // all days that have passed this month
  let tHtml=`<div class="mt-head"><div class="mt-col">Habit</div><div class="mt-col" style="text-align:center">Days</div><div class="mt-col">Progress</div></div>`;
  ALL_PERSONAL.forEach(h=>{
    const cnt=getMonthlyCount(h.id,false,yr,mo);
    const pct=mdp?Math.round(cnt/mdp*100):0;
    tHtml+=`<div class="mt-row">
      <div class="mt-name">${h.icon} ${h.name}</div>
      <div class="mt-cnt" style="color:${barColor(pct)}">${cnt}<span style="color:var(--muted);font-size:.58rem">/${mdp}</span></div>
      <div class="mt-bar-wrap"><div class="mt-bar-t"><div class="mt-bar-f" style="width:${pct}%;background:${barColor(pct)}"></div></div><span class="mt-pct">${pct}%</span></div>
    </div>`;
  });
  document.getElementById('monthlyTable').innerHTML=tHtml;
  renderCon('monthCon', hC, daysT);
}

// ── STREAKS ───────────────────────────────────────────────────────────────────
function getStreak(id) {
  const dates=Object.keys(cache).sort().reverse();
  let cur=0, long=0, temp=0, prev=null;
  for(const ds of [...dates].reverse()){
    if(cache[ds]?.habits?.[id]){
      const d=new Date(ds);
      if(!prev||(d-prev)/86400000===1){ temp++; long=Math.max(long,temp); } else temp=1;
      prev=d;
    } else { temp=0; prev=null; }
  }
  let check=new Date(todayStr());
  for(const ds of dates){
    const d=new Date(ds), diff=Math.round((check-d)/86400000);
    if(diff>1) break;
    if(cache[ds]?.habits?.[id]){ cur++; check=new Date(d); check.setDate(check.getDate()-1); }
    else if(diff===0) break;
  }
  return { cur, long:Math.max(long,cur) };
}

function renderStreaks() {
  const grid=document.getElementById('streaksGrid');
  grid.innerHTML='';
  ALL_PERSONAL.forEach(h=>{
    const s=getStreak(h.id), fire='🔥'.repeat(Math.min(s.cur,5));
    const card=document.createElement('div');
    card.className='streak-glass';
    card.innerHTML=`<div class="sg-icon">${h.icon}</div><div class="sg-val">${s.cur}</div><div class="sg-name">${h.name}</div><div class="sg-fire">${fire||'—'}</div><div class="sg-best">Best: ${s.long} days</div>`;
    grid.appendChild(card);
  });
}

// ── TABS ──────────────────────────────────────────────────────────────────────
window.switchTab = (tab, btn) => {
  currentTab=tab;
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  btn.classList.add('active');
  document.getElementById('scrollArea').scrollTop=0;
  if(tab==='planets') { renderPlanetHabits(); renderPlanetStates(); }
  if(tab==='journal') renderJournal();
  if(tab==='week')    renderWeek();
  if(tab==='month')   renderMonth();
  if(tab==='streaks') renderStreaks();
};

// ── EXPORT ────────────────────────────────────────────────────────────────────
window.openExport  = () => document.getElementById('exportModal').classList.add('open');
window.closeExport = () => document.getElementById('exportModal').classList.remove('open');

function dl(content, name, type) {
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([content],{type}));
  a.download=name; a.click();
}

window.exportJSON = () => { dl(JSON.stringify(cache,null,2),`vijay_os_${todayStr()}.json`,'application/json'); toast('JSON exported'); window.closeExport(); };
window.exportCSV  = () => {
  const rows=[['Date','Health','Wellness','Tasks','PersonalPct','PlanetPts','PlanetPct',...ALL_PERSONAL.map(h=>h.id),'lead_planet','hijacker']];
  Object.keys(cache).sort().forEach(ds=>{
    const s=calcPersonalScore(ds), ps=calcPlanetScore(ds), day=getDay(ds);
    rows.push([ds,s.hp,s.wp,s.tp,s.pct,ps.total,ps.pct,...ALL_PERSONAL.map(h=>day.habits?.[h.id]?1:0),day.journal?.leadPlanet||'',day.journal?.hijacker||'']);
  });
  dl(rows.map(r=>r.join(',')).join('\n'),`vijay_os_${todayStr()}.csv`,'text/csv');
  toast('CSV exported'); window.closeExport();
};
window.exportReport = () => {
  let r=`VIJAY OS — FULL REPORT\n${new Date().toLocaleString()}\n\n`;
  Object.keys(cache).sort().forEach(ds=>{
    const s=calcPersonalScore(ds), ps=calcPlanetScore(ds), day=getDay(ds), g=grade(s.pct);
    r+=`${ds}  Personal: ${s.pct}%  Planet: ${ps.pct}%  ${g.label}\n`;
    ALL_PERSONAL.forEach(h=>{ r+=`  ${day.habits?.[h.id]?'✓':'✗'} ${h.name}\n`; });
    const tasks=(day.tasks||[]).filter(Boolean);
    if(tasks.length){ tasks.forEach(t=>{ r+=`  ${t.done?'✓':'✗'} [${t.cat}] ${t.text}\n`; }); }
    if(day.journal?.priority) r+=`  Priority: ${day.journal.priority}\n`;
    r+='\n';
  });
  dl(r,`vijay_report_${todayStr()}.txt`,'text/plain');
  toast('Report exported'); window.closeExport();
};

// ── TOAST ─────────────────────────────────────────────────────────────────────
let tt;
function toast(msg, err=false) {
  const el=document.getElementById('toast');
  el.textContent=msg; el.className='toast show'+(err?' err':'');
  clearTimeout(tt); tt=setTimeout(()=>el.classList.remove('show'),2000);
}
window.toast=toast;

// ── INIT ──────────────────────────────────────────────────────────────────────
initSync();
</script>
